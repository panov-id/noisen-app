<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1faa88" stop-opacity=".32"/>
      <stop offset="100%" stop-color="#1faa88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a035d8" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#a035d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d87a20" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#d87a20" stop-opacity="0"/>
    </radialGradient>
    <filter id="bl"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="gw"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- axes labels -->
  <text x="600" y="36" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,.22)" text-anchor="middle" letter-spacing=".2em">← LOWER FREQUENCY · · · HIGHER FREQUENCY →</text>
  <text x="22" y="338" font-family="-apple-system,sans-serif" font-size="11" fill="rgba(255,255,255,.22)" text-anchor="middle" letter-spacing=".15em" transform="rotate(-90,22,338)">← FILTER CLOSED · FILTER OPEN →</text>

  <!-- grid -->
  <g opacity=".045" stroke="#7080ee" stroke-width=".7">
    <line x1="60" y1="60" x2="1140" y2="60"/>
    <line x1="60" y1="220" x2="1140" y2="220"/>
    <line x1="60" y1="380" x2="1140" y2="380"/>
    <line x1="60" y1="540" x2="1140" y2="540"/>
    <line x1="60" y1="60"  x2="60"  y2="615"/>
    <line x1="280" y1="60" x2="280" y2="615"/>
    <line x1="500" y1="60" x2="500" y2="615"/>
    <line x1="720" y1="60" x2="720" y2="615"/>
    <line x1="940" y1="60" x2="940" y2="615"/>
    <line x1="1140" y1="60" x2="1140" y2="615"/>
  </g>
  <!-- freq axis bottom -->
  <line x1="60" y1="615" x2="1140" y2="615" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  <text x="60"   y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">8 Hz</text>
  <text x="280"  y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">80 Hz</text>
  <text x="500"  y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">600 Hz</text>
  <text x="720"  y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">4 kHz</text>
  <text x="940"  y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">12 kHz</text>
  <text x="1140" y="632" font-family="'SF Mono',monospace" font-size="10" fill="rgba(255,255,255,.25)" text-anchor="middle">40 kHz</text>

  <!-- node glows -->
  <ellipse cx="200"  cy="470" rx="110" ry="110" fill="url(#g1)" filter="url(#bl)"/>
  <ellipse cx="520"  cy="180" rx="90"  ry="90"  fill="url(#g2)" filter="url(#bl)"/>
  <ellipse cx="820"  cy="290" rx="100" ry="100" fill="url(#g3)" filter="url(#bl)"/>
  <ellipse cx="1060" cy="420" rx="85"  ry="85"  fill="url(#g4)" filter="url(#bl)"/>
  <ellipse cx="370"  cy="340" rx="75"  ry="75"  fill="url(#g2)" filter="url(#bl)" opacity=".6"/>

  <!-- nodes -->
  <circle cx="200"  cy="470" r="24" fill="none" stroke="#3a7bd5" stroke-width="2"   filter="url(#gw)"/>
  <circle cx="200"  cy="470" r="10" fill="#3a7bd5"/>
  <circle cx="200"  cy="470" r="46" fill="none" stroke="#3a7bd5" stroke-width=".6"  opacity=".28"/>

  <circle cx="520"  cy="180" r="19" fill="none" stroke="#1faa88" stroke-width="2"   filter="url(#gw)"/>
  <circle cx="520"  cy="180" r="8"  fill="#1faa88"/>
  <circle cx="520"  cy="180" r="36" fill="none" stroke="#1faa88" stroke-width=".6"  opacity=".26"/>

  <circle cx="820"  cy="290" r="22" fill="none" stroke="#a035d8" stroke-width="2"   filter="url(#gw)"/>
  <circle cx="820"  cy="290" r="9"  fill="#a035d8"/>
  <circle cx="820"  cy="290" r="42" fill="none" stroke="#a035d8" stroke-width=".6"  opacity=".24"/>

  <circle cx="1060" cy="420" r="17" fill="none" stroke="#d87a20" stroke-width="2"   filter="url(#gw)"/>
  <circle cx="1060" cy="420" r="7"  fill="#d87a20"/>
  <circle cx="1060" cy="420" r="32" fill="none" stroke="#d87a20" stroke-width=".6"  opacity=".22"/>

  <circle cx="370"  cy="340" r="14" fill="none" stroke="#1faa88" stroke-width="1.5" filter="url(#gw)" opacity=".8"/>
  <circle cx="370"  cy="340" r="5"  fill="#1faa88" opacity=".8"/>

  <!-- callout annotations -->
  <line x1="200" y1="446" x2="200" y2="380" stroke="#3a7bd5" stroke-width=".8" stroke-dasharray="4 5" opacity=".5"/>
  <text x="200" y="372" font-family="-apple-system,sans-serif" font-size="11" fill="#6aaaff" text-anchor="middle" opacity=".8">bass · dark filter</text>

  <line x1="520" y1="156" x2="520" y2="100" stroke="#1faa88" stroke-width=".8" stroke-dasharray="4 5" opacity=".5"/>
  <text x="520" y="92" font-family="-apple-system,sans-serif" font-size="11" fill="#44ddbb" text-anchor="middle" opacity=".8">mid · open filter</text>

  <line x1="820" y1="266" x2="820" y2="210" stroke="#a035d8" stroke-width=".8" stroke-dasharray="4 5" opacity=".5"/>
  <text x="820" y="202" font-family="-apple-system,sans-serif" font-size="11" fill="#cc66ff" text-anchor="middle" opacity=".8">treble · mid filter</text>

  <!-- headline -->
  <text x="600" y="560" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="46" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-.02em">Sound is a place on the canvas.</text>
  <text x="600" y="600" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle" letter-spacing=".01em">X axis = frequency · Y axis = filter brightness · Drag to sculpt in real time</text>

  <text x="600" y="660" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,.2)" text-anchor="middle" letter-spacing=".25em">NOISEN · noisen.space</text>
</svg>
