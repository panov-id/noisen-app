<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#100808"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bl"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- drum node glow -->
  <ellipse cx="540" cy="380" rx="200" ry="200" fill="#cc3355" opacity=".2" filter="url(#bl)"/>

  <!-- step sequencer grid — 16 steps, 5 rows -->
  <!-- kick row -->
  <text x="60" y="196" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,120,80,.6)" letter-spacing=".1em">KICK</text>
  <!-- steps: 1,5,9,13 on -->
  <g fill="#cc4433">
    <rect x="120" y="175" width="48" height="28" rx="6"/>
    <rect x="296" y="175" width="48" height="28" rx="6"/>
    <rect x="472" y="175" width="48" height="28" rx="6"/>
    <rect x="648" y="175" width="48" height="28" rx="6"/>
  </g>
  <g fill="#1a1018" stroke="rgba(255,100,80,.2)" stroke-width="1">
    <rect x="164" y="175" width="48" height="28" rx="6"/><rect x="208" y="175" width="48" height="28" rx="6"/>
    <rect x="252" y="175" width="48" height="28" rx="6"/><rect x="340" y="175" width="48" height="28" rx="6"/>
    <rect x="384" y="175" width="48" height="28" rx="6"/><rect x="428" y="175" width="48" height="28" rx="6"/>
    <rect x="516" y="175" width="48" height="28" rx="6"/><rect x="560" y="175" width="48" height="28" rx="6"/>
    <rect x="604" y="175" width="48" height="28" rx="6"/><rect x="692" y="175" width="48" height="28" rx="6"/>
    <rect x="736" y="175" width="48" height="28" rx="6"/><rect x="780" y="175" width="48" height="28" rx="6"/>
    <rect x="824" y="175" width="48" height="28" rx="6"/><rect x="868" y="175" width="48" height="28" rx="6"/>
    <rect x="912" y="175" width="48" height="28" rx="6"/><rect x="956" y="175" width="48" height="28" rx="6"/>
  </g>

  <!-- snare row -->
  <text x="60" y="240" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,180,80,.6)" letter-spacing=".1em">SNARE</text>
  <g fill="#cc8833">
    <rect x="296" y="219" width="48" height="28" rx="6"/>
    <rect x="648" y="219" width="48" height="28" rx="6"/>
  </g>
  <g fill="#1a1008" stroke="rgba(255,180,80,.18)" stroke-width="1">
    <rect x="120" y="219" width="48" height="28" rx="6"/><rect x="164" y="219" width="48" height="28" rx="6"/>
    <rect x="208" y="219" width="48" height="28" rx="6"/><rect x="252" y="219" width="48" height="28" rx="6"/>
    <rect x="340" y="219" width="48" height="28" rx="6"/><rect x="384" y="219" width="48" height="28" rx="6"/>
    <rect x="428" y="219" width="48" height="28" rx="6"/><rect x="472" y="219" width="48" height="28" rx="6"/>
    <rect x="516" y="219" width="48" height="28" rx="6"/><rect x="560" y="219" width="48" height="28" rx="6"/>
    <rect x="604" y="219" width="48" height="28" rx="6"/><rect x="692" y="219" width="48" height="28" rx="6"/>
    <rect x="736" y="219" width="48" height="28" rx="6"/><rect x="780" y="219" width="48" height="28" rx="6"/>
    <rect x="824" y="219" width="48" height="28" rx="6"/><rect x="868" y="219" width="48" height="28" rx="6"/>
    <rect x="912" y="219" width="48" height="28" rx="6"/><rect x="956" y="219" width="48" height="28" rx="6"/>
  </g>

  <!-- hihat row -->
  <text x="60" y="284" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(180,220,255,.6)" letter-spacing=".1em">HI-HAT</text>
  <g fill="#2255aa">
    <rect x="120" y="263" width="48" height="28" rx="6"/>
    <rect x="208" y="263" width="48" height="28" rx="6"/>
    <rect x="296" y="263" width="48" height="28" rx="6"/>
    <rect x="384" y="263" width="48" height="28" rx="6"/>
    <rect x="472" y="263" width="48" height="28" rx="6"/>
    <rect x="560" y="263" width="48" height="28" rx="6"/>
    <rect x="648" y="263" width="48" height="28" rx="6"/>
    <rect x="736" y="263" width="48" height="28" rx="6"/>
  </g>
  <g fill="#080c18" stroke="rgba(80,150,255,.18)" stroke-width="1">
    <rect x="164" y="263" width="48" height="28" rx="6"/><rect x="252" y="263" width="48" height="28" rx="6"/>
    <rect x="340" y="263" width="48" height="28" rx="6"/><rect x="428" y="263" width="48" height="28" rx="6"/>
    <rect x="516" y="263" width="48" height="28" rx="6"/><rect x="604" y="263" width="48" height="28" rx="6"/>
    <rect x="692" y="263" width="48" height="28" rx="6"/><rect x="780" y="263" width="48" height="28" rx="6"/>
    <rect x="824" y="263" width="48" height="28" rx="6"/><rect x="868" y="263" width="48" height="28" rx="6"/>
    <rect x="912" y="263" width="48" height="28" rx="6"/><rect x="956" y="263" width="48" height="28" rx="6"/>
  </g>

  <!-- drum node on canvas -->
  <circle cx="540" cy="480" r="46" fill="none" stroke="#cc3355" stroke-width="3.5" filter="url(#glow)"/>
  <circle cx="540" cy="480" r="18" fill="#cc3355"/>
  <circle cx="540" cy="480" r="85" fill="none" stroke="#cc3355" stroke-width="1" opacity=".18"/>
  <!-- euclidean label -->
  <text x="540" y="560" font-family="-apple-system,sans-serif" font-size="16" fill="rgba(255,80,100,.5)" text-anchor="middle" letter-spacing=".2em">KICK · EUCLIDEAN</text>

  <!-- comet hitting drum node -->
  <circle cx="680" cy="480" r="8" fill="rgba(255,220,80,.7)"/>
  <circle cx="680" cy="480" r="16" fill="none" stroke="rgba(255,220,80,.3)" stroke-width="1.5"/>
  <path d="M 820 350 Q 750 420 680 480" fill="none" stroke="rgba(255,220,80,.25)" stroke-width="2" stroke-linecap="round"/>
  <text x="760" y="420" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,220,80,.45)" text-anchor="middle">comet triggers drum</text>

  <!-- headline -->
  <text x="540" y="720" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="76" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-.03em">Drums.</text>
  <text x="540" y="800" font-family="-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,.4)" text-anchor="middle">Step sequencer · Euclidean rhythms</text>
  <text x="540" y="840" font-family="-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,.28)" text-anchor="middle">Comets trigger hits · Orbits animate parameters</text>

  <text x="540" y="940" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,100,80,.4)" text-anchor="middle" letter-spacing=".05em">kick · snare · hihat · clap · perc</text>

  <text x="540" y="1058" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,.2)" text-anchor="middle" letter-spacing=".2em">4 / 5</text>
</svg>
