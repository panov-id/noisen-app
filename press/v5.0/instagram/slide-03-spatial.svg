<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0d0d20"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bl"><feGaussianBlur stdDeviation="38"/></filter>
    <linearGradient id="xgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2244aa" stop-opacity=".7"/>
      <stop offset="50%" stop-color="#3a7bd5" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#aaddff" stop-opacity=".7"/>
    </linearGradient>
    <linearGradient id="ygrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffdd88" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#334488" stop-opacity=".5"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- canvas area -->
  <rect x="80" y="120" width="920" height="640" rx="20" fill="rgba(0,0,0,.3)" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

  <!-- grid faint -->
  <g opacity=".04" stroke="#7080ee" stroke-width="1">
    <line x1="80" y1="280" x2="1000" y2="280"/>
    <line x1="80" y1="440" x2="1000" y2="440"/>
    <line x1="80" y1="600" x2="1000" y2="600"/>
    <line x1="260" y1="120" x2="260" y2="760"/>
    <line x1="540" y1="120" x2="540" y2="760"/>
    <line x1="820" y1="120" x2="820" y2="760"/>
  </g>

  <!-- X axis -->
  <line x1="80" y1="760" x2="1000" y2="760" stroke="url(#xgrad)" stroke-width="2"/>
  <text x="80"  y="795" font-family="'SF Mono',monospace" font-size="18" fill="rgba(255,255,255,.3)">8 Hz</text>
  <text x="490" y="795" font-family="'SF Mono',monospace" font-size="18" fill="rgba(255,255,255,.3)" text-anchor="middle">600 Hz</text>
  <text x="990" y="795" font-family="'SF Mono',monospace" font-size="18" fill="rgba(255,255,255,.3)" text-anchor="end">40 kHz</text>
  <text x="540" y="820" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,255,255,.18)" text-anchor="middle" letter-spacing=".2em">← FREQUENCY →</text>

  <!-- Y axis -->
  <line x1="80" y1="120" x2="80" y2="760" stroke="url(#ygrad)" stroke-width="2"/>
  <text x="68" y="148" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(255,220,100,.45)" text-anchor="end">bright</text>
  <text x="68" y="750" font-family="-apple-system,sans-serif" font-size="14" fill="rgba(100,130,200,.4)" text-anchor="end">dark</text>

  <!-- nodes -->
  <ellipse cx="190" cy="620" rx="130" ry="130" fill="#3a7bd5" opacity=".14" filter="url(#bl)"/>
  <circle cx="190" cy="620" r="35" fill="none" stroke="#3a7bd5" stroke-width="3" filter="url(#glow)"/>
  <circle cx="190" cy="620" r="14" fill="#3a7bd5"/>
  <line x1="190" y1="583" x2="190" y2="510" stroke="#3a7bd5" stroke-width="1" stroke-dasharray="4 5" opacity=".5"/>
  <text x="190" y="500" font-family="-apple-system,sans-serif" font-size="16" fill="#6aaaff" text-anchor="middle" opacity=".8">bass · dark filter</text>

  <ellipse cx="480" cy="210" rx="110" ry="110" fill="#1faa88" opacity=".14" filter="url(#bl)"/>
  <circle cx="480" cy="210" r="28" fill="none" stroke="#1faa88" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="480" cy="210" r="11" fill="#1faa88"/>
  <line x1="480" y1="240" x2="480" y2="300" stroke="#1faa88" stroke-width="1" stroke-dasharray="4 5" opacity=".5"/>
  <text x="480" y="320" font-family="-apple-system,sans-serif" font-size="16" fill="#44ddbb" text-anchor="middle" opacity=".8">mid · open filter</text>

  <ellipse cx="780" cy="350" rx="120" ry="120" fill="#a035d8" opacity=".14" filter="url(#bl)"/>
  <circle cx="780" cy="350" r="30" fill="none" stroke="#a035d8" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="780" cy="350" r="12" fill="#a035d8"/>

  <ellipse cx="930" cy="560" rx="90" ry="90" fill="#d87a20" opacity=".13" filter="url(#bl)"/>
  <circle cx="930" cy="560" r="22" fill="none" stroke="#d87a20" stroke-width="2.5" filter="url(#glow)"/>
  <circle cx="930" cy="560" r="9"  fill="#d87a20"/>

  <!-- headline -->
  <text x="540" y="900" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="72" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="-.03em">Space is sound.</text>
  <text x="540" y="960" font-family="-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,.4)" text-anchor="middle">X = frequency · Y = filter brightness</text>
  <text x="540" y="998" font-family="-apple-system,sans-serif" font-size="24" fill="rgba(255,255,255,.28)" text-anchor="middle">Drag to sculpt timbre in real time</text>

  <text x="540" y="1058" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,.2)" text-anchor="middle" letter-spacing=".2em">3 / 5</text>
</svg>
