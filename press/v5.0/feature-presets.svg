<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0e0c0a"/>
      <stop offset="100%" stop-color="#04040a"/>
    </radialGradient>
    <filter id="bl"><feGaussianBlur stdDeviation="20"/></filter>
    <filter id="gw"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- preset cards — 5 across, 2 rows -->
  <!-- row 1 -->
  <!-- Binaural -->
  <rect x="60"  y="80" width="196" height="100" rx="12" fill="#0d1428" stroke="#3a7bd5" stroke-width="1" opacity=".85"/>
  <text x="158" y="120" font-family="-apple-system,sans-serif" font-size="22" fill="#6aabff" text-anchor="middle">🧠</text>
  <text x="158" y="146" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#aac4ff" text-anchor="middle">Binaural Beats</text>
  <text x="158" y="164" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.32)" text-anchor="middle">delta · theta · alpha · beta</text>

  <!-- Solfeggio -->
  <rect x="266" y="80" width="196" height="100" rx="12" fill="#0d1a14" stroke="#1faa88" stroke-width="1" opacity=".85"/>
  <text x="364" y="120" font-family="-apple-system,sans-serif" font-size="22" fill="#44ddaa" text-anchor="middle">✦</text>
  <text x="364" y="146" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#88ffcc" text-anchor="middle">Solfeggio</text>
  <text x="364" y="164" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.32)" text-anchor="middle">174 · 285 · 396 · 528 Hz</text>

  <!-- Harmonic -->
  <rect x="472" y="80" width="196" height="100" rx="12" fill="#18100e" stroke="#d87a20" stroke-width="1" opacity=".85"/>
  <text x="570" y="120" font-family="-apple-system,sans-serif" font-size="22" fill="#ffaa44" text-anchor="middle">〜</text>
  <text x="570" y="146" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffcc88" text-anchor="middle">Harmonic Series</text>
  <text x="570" y="164" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.32)" text-anchor="middle">natural overtone stack</text>

  <!-- Full Spectrum -->
  <rect x="678" y="80" width="196" height="100" rx="12" fill="#140e20" stroke="#a035d8" stroke-width="1" opacity=".85"/>
  <text x="776" y="120" font-family="-apple-system,sans-serif" font-size="22" fill="#cc66ff" text-anchor="middle">◈</text>
  <text x="776" y="146" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#dd99ff" text-anchor="middle">Full Spectrum</text>
  <text x="776" y="164" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.32)" text-anchor="middle">sub · bass · mid · air</text>

  <!-- Gamelan -->
  <rect x="884" y="80" width="256" height="100" rx="12" fill="#0e1810" stroke="#44dd88" stroke-width="1" opacity=".85"/>
  <text x="1012" y="120" font-family="-apple-system,sans-serif" font-size="22" fill="#66ffaa" text-anchor="middle">∿</text>
  <text x="1012" y="146" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#99ffcc" text-anchor="middle">Gamelan Bells</text>
  <text x="1012" y="164" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.32)" text-anchor="middle">metallic resonance cloud</text>

  <!-- row 2 -->
  <rect x="60"  y="200" width="196" height="100" rx="12" fill="#100e1a" stroke="#6655dd" stroke-width="1" opacity=".8"/>
  <text x="158" y="240" font-family="-apple-system,sans-serif" font-size="22" fill="#9988ff" text-anchor="middle">∞</text>
  <text x="158" y="266" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#bbaaff" text-anchor="middle">Fibonacci</text>
  <text x="158" y="284" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.28)" text-anchor="middle">1.618 ratio tuning</text>

  <rect x="266" y="200" width="196" height="100" rx="12" fill="#161008" stroke="#cc8822" stroke-width="1" opacity=".8"/>
  <text x="364" y="240" font-family="-apple-system,sans-serif" font-size="22" fill="#ffaa33" text-anchor="middle">♩</text>
  <text x="364" y="266" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffcc66" text-anchor="middle">Pentatonic Pulse</text>
  <text x="364" y="284" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.28)" text-anchor="middle">rhythmic melodic loop</text>

  <rect x="472" y="200" width="196" height="100" rx="12" fill="#081612" stroke="#22aa66" stroke-width="1" opacity=".8"/>
  <text x="570" y="240" font-family="-apple-system,sans-serif" font-size="22" fill="#33dd88" text-anchor="middle">⚄</text>
  <text x="570" y="266" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#66ffaa" text-anchor="middle">Polyrhythm</text>
  <text x="570" y="284" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.28)" text-anchor="middle">interlocking beat patterns</text>

  <rect x="678" y="200" width="196" height="100" rx="12" fill="#180808" stroke="#cc3333" stroke-width="1" opacity=".8"/>
  <text x="776" y="240" font-family="-apple-system,sans-serif" font-size="22" fill="#ff6666" text-anchor="middle">≈</text>
  <text x="776" y="266" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ffaaaa" text-anchor="middle">Drone Swarm</text>
  <text x="776" y="284" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.28)" text-anchor="middle">dense microtonal cluster</text>

  <rect x="884" y="200" width="256" height="100" rx="12" fill="#080e18" stroke="#2255cc" stroke-width="1" opacity=".8"/>
  <text x="1012" y="240" font-family="-apple-system,sans-serif" font-size="22" fill="#4488ff" text-anchor="middle">♬</text>
  <text x="1012" y="266" font-family="-apple-system,sans-serif" font-size="13" font-weight="600" fill="#88aaff" text-anchor="middle">Scale</text>
  <text x="1012" y="284" font-family="-apple-system,sans-serif" font-size="10" fill="rgba(255,255,255,.28)" text-anchor="middle">modal / chromatic patterns</text>

  <!-- shuffle button visualization -->
  <rect x="492" y="336" width="216" height="64" rx="32" fill="#1a1a32" stroke="#4455ff" stroke-width="1.5"/>
  <text x="600" y="376" font-family="-apple-system,sans-serif" font-size="28" fill="#8899ff" text-anchor="middle">⚄  Shuffle</text>

  <!-- arrow pointing to shuffle -->
  <text x="600" y="424" font-family="-apple-system,sans-serif" font-size="12" fill="rgba(255,255,255,.28)" text-anchor="middle" letter-spacing=".05em">tap once · get a new world every time</text>

  <!-- headline -->
  <text x="600" y="510" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="44" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-.02em">10 scientific archetypes.</text>
  <text x="600" y="555" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">Binaural · Solfeggio · Harmonic · Fibonacci · Gamelan · Drone — and more</text>
  <text x="600" y="590" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">Every shuffle is unique. Every result is playable immediately.</text>

  <text x="600" y="650" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,.2)" text-anchor="middle" letter-spacing=".25em">NOISEN · noisen.space</text>
</svg>
