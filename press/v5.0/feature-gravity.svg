<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#04040c"/>
    </radialGradient>
    <radialGradient id="gc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity=".5"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <filter id="bl"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="gw"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- gravity field rings from center cluster -->
  <circle cx="600" cy="300" r="80"  fill="none" stroke="#3a7bd5" stroke-width=".6" opacity=".12"/>
  <circle cx="600" cy="300" r="150" fill="none" stroke="#3a7bd5" stroke-width=".5" opacity=".09"/>
  <circle cx="600" cy="300" r="230" fill="none" stroke="#3a7bd5" stroke-width=".4" opacity=".06"/>
  <circle cx="600" cy="300" r="330" fill="none" stroke="#3a7bd5" stroke-width=".3" opacity=".04"/>

  <!-- gravity pull arrows (showing nodes being pulled toward center cluster) -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="rgba(58,123,213,.5)"/>
    </marker>
  </defs>

  <!-- outer nodes being pulled in -->
  <ellipse cx="180" cy="200" rx="70" ry="70" fill="url(#gc)" filter="url(#bl)" opacity=".7"/>
  <ellipse cx="1020" cy="180" rx="65" ry="65" fill="url(#gc)" filter="url(#bl)" opacity=".65"/>
  <ellipse cx="200" cy="500" rx="60" ry="60" fill="url(#gc)" filter="url(#bl)" opacity=".6"/>
  <ellipse cx="1000" cy="480" rx="65" ry="65" fill="url(#gc)" filter="url(#bl)" opacity=".6"/>
  <ellipse cx="600" cy="100" rx="55" ry="55" fill="url(#gc)" filter="url(#bl)" opacity=".55"/>

  <!-- pull lines -->
  <line x1="180" y1="200" x2="520" y2="280" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="5 8" opacity=".35" marker-end="url(#arr)"/>
  <line x1="1020" y1="180" x2="680" y2="270" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="5 8" opacity=".35" marker-end="url(#arr)"/>
  <line x1="200" y1="500" x2="520" y2="330" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="5 8" opacity=".3"  marker-end="url(#arr)"/>
  <line x1="1000" y1="480" x2="680" y2="330" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="5 8" opacity=".3"  marker-end="url(#arr)"/>
  <line x1="600" y1="100" x2="600" y2="240" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="5 8" opacity=".3"  marker-end="url(#arr)"/>

  <!-- outer nodes -->
  <circle cx="180"  cy="200" r="16" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".8"/>
  <circle cx="180"  cy="200" r="6"  fill="#3a7bd5" opacity=".8"/>
  <circle cx="1020" cy="180" r="14" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".75"/>
  <circle cx="1020" cy="180" r="5.5" fill="#3a7bd5" opacity=".75"/>
  <circle cx="200"  cy="500" r="13" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".72"/>
  <circle cx="200"  cy="500" r="5"  fill="#3a7bd5" opacity=".72"/>
  <circle cx="1000" cy="480" r="15" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".72"/>
  <circle cx="1000" cy="480" r="6"  fill="#3a7bd5" opacity=".72"/>
  <circle cx="600"  cy="100" r="12" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".68"/>
  <circle cx="600"  cy="100" r="4.5" fill="#3a7bd5" opacity=".68"/>

  <!-- center cluster — 4 nodes in tight unison -->
  <ellipse cx="600" cy="300" rx="140" ry="140" fill="url(#gc)" filter="url(#bl)"/>
  <circle cx="570" cy="285" r="22" fill="none" stroke="#3a7bd5" stroke-width="2.5" filter="url(#gw)"/>
  <circle cx="570" cy="285" r="10" fill="#3a7bd5"/>
  <circle cx="570" cy="285" r="42" fill="none" stroke="#3a7bd5" stroke-width=".7" opacity=".3"/>
  <circle cx="628" cy="295" r="19" fill="none" stroke="#3a7bd5" stroke-width="2.2" filter="url(#gw)"/>
  <circle cx="628" cy="295" r="8"  fill="#3a7bd5"/>
  <circle cx="596" cy="320" r="16" fill="none" stroke="#3a7bd5" stroke-width="2"   filter="url(#gw)" opacity=".9"/>
  <circle cx="596" cy="320" r="6"  fill="#3a7bd5" opacity=".9"/>
  <circle cx="615" cy="270" r="14" fill="none" stroke="#3a7bd5" stroke-width="1.8" filter="url(#gw)" opacity=".85"/>
  <circle cx="615" cy="270" r="5.5" fill="#3a7bd5" opacity=".85"/>

  <!-- headline -->
  <text x="600" y="520" font-family="-apple-system,'Helvetica Neue',sans-serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="-.02em">Nodes pull each other's pitch.</text>
  <text x="600" y="565" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">Tight cluster = unison drone · Spread apart = independent tones</text>
  <text x="600" y="608" font-family="-apple-system,sans-serif" font-size="18" fill="rgba(255,255,255,.4)" text-anchor="middle">Gravity slider controls how strongly nodes interact in real time</text>

  <text x="600" y="660" font-family="-apple-system,sans-serif" font-size="13" fill="rgba(255,255,255,.2)" text-anchor="middle" letter-spacing=".25em">NOISEN · noisen.space</text>
</svg>
