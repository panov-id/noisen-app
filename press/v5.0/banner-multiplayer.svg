<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#05050e"/>
    </radialGradient>
    <radialGradient id="gA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1faa88" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#1faa88" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gC" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a035d8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#a035d8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gD" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d87a20" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d87a20" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur-sm"><feGaussianBlur stdDeviation="18"/></filter>
    <filter id="blur-xs"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7090ff" stroke-width="0.5">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Node glows — left device -->
  <ellipse cx="240" cy="260" rx="100" ry="100" fill="url(#gA)" filter="url(#blur-sm)"/>
  <ellipse cx="340" cy="380" rx="80" ry="80" fill="url(#gB)" filter="url(#blur-sm)"/>
  <ellipse cx="160" cy="400" rx="70" ry="70" fill="url(#gC)" filter="url(#blur-sm)"/>

  <!-- Node glows — right device -->
  <ellipse cx="950" cy="250" rx="90" ry="90" fill="url(#gD)" filter="url(#blur-sm)"/>
  <ellipse cx="860" cy="380" rx="75" ry="75" fill="url(#gA)" filter="url(#blur-sm)"/>
  <ellipse cx="1040" cy="390" rx="65" ry="65" fill="url(#gB)" filter="url(#blur-sm)"/>

  <!-- Connection lines between devices -->
  <g opacity="0.5">
    <line x1="240" y1="260" x2="950" y2="250" stroke="#3a7bd5" stroke-width="1" stroke-dasharray="6 10" opacity="0.4"/>
    <line x1="340" y1="380" x2="860" y2="380" stroke="#1faa88" stroke-width="1" stroke-dasharray="6 10" opacity="0.35"/>
    <line x1="160" y1="400" x2="1040" y2="390" stroke="#a035d8" stroke-width="1" stroke-dasharray="6 10" opacity="0.3"/>
  </g>

  <!-- Left nodes -->
  <circle cx="240" cy="260" r="18" fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="240" cy="260" r="8" fill="#3a7bd5" opacity="0.9"/>
  <circle cx="240" cy="260" r="34" fill="none" stroke="#3a7bd5" stroke-width="0.5" opacity="0.3"/>
  <circle cx="240" cy="260" r="52" fill="none" stroke="#3a7bd5" stroke-width="0.3" opacity="0.15"/>

  <circle cx="340" cy="380" r="14" fill="none" stroke="#1faa88" stroke-width="1.5" opacity="0.85" filter="url(#glow)"/>
  <circle cx="340" cy="380" r="6" fill="#1faa88" opacity="0.85"/>
  <circle cx="340" cy="380" r="26" fill="none" stroke="#1faa88" stroke-width="0.5" opacity="0.3"/>

  <circle cx="160" cy="400" r="12" fill="none" stroke="#a035d8" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
  <circle cx="160" cy="400" r="5" fill="#a035d8" opacity="0.8"/>

  <!-- Right nodes -->
  <circle cx="950" cy="250" r="16" fill="none" stroke="#d87a20" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
  <circle cx="950" cy="250" r="7" fill="#d87a20" opacity="0.9"/>
  <circle cx="950" cy="250" r="30" fill="none" stroke="#d87a20" stroke-width="0.5" opacity="0.3"/>
  <circle cx="950" cy="250" r="48" fill="none" stroke="#d87a20" stroke-width="0.3" opacity="0.15"/>

  <circle cx="860" cy="380" r="13" fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.85" filter="url(#glow)"/>
  <circle cx="860" cy="380" r="5" fill="#3a7bd5" opacity="0.85"/>
  <circle cx="860" cy="380" r="24" fill="none" stroke="#3a7bd5" stroke-width="0.5" opacity="0.25"/>

  <circle cx="1040" cy="390" r="11" fill="none" stroke="#1faa88" stroke-width="1.5" opacity="0.8" filter="url(#glow)"/>
  <circle cx="1040" cy="390" r="4.5" fill="#1faa88" opacity="0.8"/>

  <!-- Center connection pulse -->
  <circle cx="600" cy="315" r="4" fill="#7090ff" opacity="0.9"/>
  <circle cx="600" cy="315" r="12" fill="none" stroke="#7090ff" stroke-width="1" opacity="0.5"/>
  <circle cx="600" cy="315" r="22" fill="none" stroke="#7090ff" stroke-width="0.5" opacity="0.25"/>

  <!-- Version badge -->
  <rect x="48" y="44" width="90" height="32" rx="16" fill="#3a7bd5" opacity="0.18"/>
  <rect x="48" y="44" width="90" height="32" rx="16" fill="none" stroke="#3a7bd5" stroke-width="1" opacity="0.5"/>
  <text x="93" y="65" font-family="'SF Mono', 'Fira Mono', monospace" font-size="14" fill="#6aa3ff" text-anchor="middle" letter-spacing="0.04em">v5.0</text>

  <!-- Main headline -->
  <text x="600" y="500" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="56" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-0.02em">Play sound together.</text>
  <text x="600" y="555" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="22" fill="#8899cc" text-anchor="middle" letter-spacing="0.01em">Real-time multiplayer · Share a link · No account needed</text>

  <!-- Logo wordmark -->
  <text x="600" y="82" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="18" font-weight="300" fill="#ffffff" text-anchor="middle" opacity="0.5" letter-spacing="0.25em">NOISEN</text>
</svg>
