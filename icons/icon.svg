<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#060609"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- glow behind rings -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- concentric rings — mimics the node wave visualization -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#3a7bd5" stroke-width="3"  opacity="0.18"/>
  <circle cx="256" cy="256" r="138" fill="none" stroke="#3a7bd5" stroke-width="4"  opacity="0.30"/>
  <circle cx="256" cy="256" r="108" fill="none" stroke="#3a7bd5" stroke-width="5"  opacity="0.46"/>
  <circle cx="256" cy="256" r="78"  fill="none" stroke="#3a7bd5" stroke-width="7"  opacity="0.65"/>
  <circle cx="256" cy="256" r="48"  fill="none" stroke="#3a7bd5" stroke-width="9"  opacity="0.85"/>

  <!-- center dot -->
  <circle cx="256" cy="256" r="16" fill="#3a7bd5"/>
  <circle cx="256" cy="256" r="8"  fill="#7ab3f0"/>
</svg>
