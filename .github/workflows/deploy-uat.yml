name: Deploy UAT

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Bundle vendor scripts
        run: |
          mkdir -p source/public/vendor
          node_modules/.bin/esbuild node_modules/qrcode/lib/browser.js \
            --bundle --format=iife --global-name=QRCode \
            --platform=browser --minify \
            --outfile=source/public/vendor/qrcode.min.js

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PLAUSIBLE_URL: ${{ secrets.VITE_PLAUSIBLE_URL }}

      - name: Deploy to UAT CDN
        env:
          BUNNY_STORAGE_API_KEY: ${{ secrets.BUNNY_UAT_STORAGE_API_KEY }}
          BUNNY_STORAGE_ZONE: ${{ secrets.BUNNY_UAT_STORAGE_ZONE }}
          BUNNY_API_KEY: ${{ secrets.BUNNY_UAT_API_KEY }}
          BUNNY_PULL_ZONE_ID: ${{ secrets.BUNNY_UAT_PULL_ZONE_ID }}
        run: bash infrastructure/scripts/deploy-cdn-ci.sh
