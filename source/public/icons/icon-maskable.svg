      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#060609"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#3a7bd5" stroke-width="3"  opacity="0.18"/>
  <circle cx="256" cy="256" r="128" fill="none" stroke="#3a7bd5" stroke-width="4"  opacity="0.30"/>
  <circle cx="256" cy="256" r="96"  fill="none" stroke="#3a7bd5" stroke-width="6"  opacity="0.48"/>
  <circle cx="256" cy="256" r="64"  fill="none" stroke="#3a7bd5" stroke-width="8"  opacity="0.68"/>
  <circle cx="256" cy="256" r="34"  fill="none" stroke="#3a7bd5" stroke-width="10" opacity="0.88"/>
  <circle cx="256" cy="256" r="14"  fill="#3a7bd5"/>
  <circle cx="256" cy="256" r="7"   fill="#7ab3f0"/>
</svg>
