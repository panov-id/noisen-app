<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="40%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#05050c"/>
    </radialGradient>
    <radialGradient id="g-sine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a7bd5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#3a7bd5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-tri" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1fa0aa" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#1fa0aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-kick" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e05530" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#e05530" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-snare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a020" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#d4a020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-hihat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#30c8a0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#30c8a0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle dot grid -->
  <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
    <circle cx="28" cy="28" r="0.7" fill="rgba(255,255,255,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- divider line — ambient left / beat right -->
  <line x1="600" y1="40" x2="600" y2="590" stroke="rgba(255,255,255,0.055)" stroke-width="1" stroke-dasharray="4,8"/>

  <!-- ── LEFT: Ambient mode ──────────────────────────────────── -->

  <!-- node 1: sine — deep bass -->
  <ellipse cx="195" cy="330" rx="200" ry="200" fill="url(#g-sine)"/>
  <circle cx="195" cy="330" r="155" fill="none" stroke="#3a7bd5" stroke-width="1" opacity="0.12"/>
  <circle cx="195" cy="330" r="110" fill="none" stroke="#3a7bd5" stroke-width="1.5" opacity="0.20"/>
  <circle cx="195" cy="330" r="70"  fill="none" stroke="#3a7bd5" stroke-width="2"   opacity="0.32"/>
  <circle cx="195" cy="330" r="38"  fill="none" stroke="#3a7bd5" stroke-width="3"   opacity="0.52"/>
  <circle cx="195" cy="330" r="19"  fill="#3a7bd5" opacity="0.88"/>
  <circle cx="195" cy="330" r="7"   fill="#7ab3f0"/>
  <!-- orbit ring -->
  <circle cx="195" cy="330" r="58" fill="none" stroke="#3a7bd5" stroke-width="1.2" stroke-dasharray="3,6" opacity="0.28"/>
  <circle cx="195" cy="272" r="4"  fill="#3a7bd5" opacity="0.6"/>

  <!-- node 2: triangle — mid -->
  <ellipse cx="420" cy="200" rx="170" ry="170" fill="url(#g-tri)"/>
  <circle cx="420" cy="200" r="130" fill="none" stroke="#1fa0aa" stroke-width="1" opacity="0.13"/>
  <circle cx="420" cy="200" r="92"  fill="none" stroke="#1fa0aa" stroke-width="1.8" opacity="0.22"/>
  <circle cx="420" cy="200" r="57"  fill="none" stroke="#1fa0aa" stroke-width="2.5" opacity="0.38"/>
  <circle cx="420" cy="200" r="29"  fill="none" stroke="#1fa0aa" stroke-width="3.5" opacity="0.58"/>
  <circle cx="420" cy="200" r="14"  fill="#1fa0aa" opacity="0.90"/>
  <circle cx="420" cy="200" r="5"   fill="#6ed4dc"/>
  <!-- orbit ring -->
  <circle cx="420" cy="200" r="48" fill="none" stroke="#1fa0aa" stroke-width="1.2" stroke-dasharray="3,5" opacity="0.30"/>
  <circle cx="468" cy="200" r="3.5" fill="#1fa0aa" opacity="0.55"/>

  <!-- node 3: noise — high air -->
  <ellipse cx="520" cy="440" rx="130" ry="130" fill="url(#g-tri)"/>
  <circle cx="520" cy="440" r="95"  fill="none" stroke="#1d9e5a" stroke-width="1" opacity="0.12"/>
  <circle cx="520" cy="440" r="65"  fill="none" stroke="#1d9e5a" stroke-width="1.8" opacity="0.22"/>
  <circle cx="520" cy="440" r="40"  fill="none" stroke="#1d9e5a" stroke-width="2.5" opacity="0.36"/>
  <circle cx="520" cy="440" r="20"  fill="#1d9e5a" opacity="0.85"/>
  <circle cx="520" cy="440" r="7"   fill="#5cd68a"/>

  <!-- gravity links -->
  <line x1="214" y1="316" x2="406" y2="211" stroke="rgba(80,150,255,0.13)" stroke-width="1.4"/>
  <line x1="433" y1="214" x2="510" y2="427" stroke="rgba(80,150,255,0.10)" stroke-width="1.2"/>
  <line x1="210" y1="340" x2="508" y2="440" stroke="rgba(80,150,255,0.07)" stroke-width="1"/>

  <!-- "AMBIENT" label -->
  <text x="50" y="575" font-family="ui-monospace,'SF Mono','Fira Code',monospace"
        font-size="11" letter-spacing="4" fill="rgba(255,255,255,0.22)" font-weight="400">AMBIENT</text>

  <!-- ── RIGHT: Beat mode ───────────────────────────────────── -->

  <!-- kick node -->
  <ellipse cx="740" cy="220" rx="155" ry="155" fill="url(#g-kick)"/>
  <circle cx="740" cy="220" r="115" fill="none" stroke="#e05530" stroke-width="1" opacity="0.14"/>
  <circle cx="740" cy="220" r="78"  fill="none" stroke="#e05530" stroke-width="1.8" opacity="0.24"/>
  <circle cx="740" cy="220" r="48"  fill="none" stroke="#e05530" stroke-width="2.5" opacity="0.40"/>
  <circle cx="740" cy="220" r="25"  fill="none" stroke="#e05530" stroke-width="3.5" opacity="0.60"/>
  <circle cx="740" cy="220" r="13"  fill="#e05530" opacity="0.92"/>
  <circle cx="740" cy="220" r="5"   fill="#f58060"/>

  <!-- snare node -->
  <ellipse cx="920" cy="310" rx="130" ry="130" fill="url(#g-snare)"/>
  <circle cx="920" cy="310" r="95"  fill="none" stroke="#d4a020" stroke-width="1" opacity="0.13"/>
  <circle cx="920" cy="310" r="64"  fill="none" stroke="#d4a020" stroke-width="1.8" opacity="0.23"/>
  <circle cx="920" cy="310" r="40"  fill="none" stroke="#d4a020" stroke-width="2.5" opacity="0.38"/>
  <circle cx="920" cy="310" r="21"  fill="#d4a020" opacity="0.90"/>
  <circle cx="920" cy="310" r="7"   fill="#f5c840"/>

  <!-- hihat node -->
  <ellipse cx="820" cy="430" rx="110" ry="110" fill="url(#g-hihat)"/>
  <circle cx="820" cy="430" r="80"  fill="none" stroke="#30c8a0" stroke-width="1" opacity="0.13"/>
  <circle cx="820" cy="430" r="53"  fill="none" stroke="#30c8a0" stroke-width="1.8" opacity="0.24"/>
  <circle cx="820" cy="430" r="32"  fill="none" stroke="#30c8a0" stroke-width="2.5" opacity="0.40"/>
  <circle cx="820" cy="430" r="17"  fill="#30c8a0" opacity="0.90"/>
  <circle cx="820" cy="430" r="6"   fill="#70e8c0"/>

  <!-- 16-step sequencer grid for kick (below kick node) -->
  <!-- row 1 steps 1-16 as small squares, some lit -->
  <g transform="translate(635, 520)" opacity="0.85">
    <!-- step cells: 16 steps, 34px wide each, 5px gap, height 18px -->
    <!-- using simplified 16 steps at 22px each -->
    <!-- kick pattern: 1,5,9,13 on (four on the floor) -->
    <rect x="0"   y="0" width="20" height="14" rx="2" fill="#e05530" opacity="0.90"/>
    <rect x="23"  y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="46"  y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="69"  y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="95"  y="0" width="20" height="14" rx="2" fill="#e05530" opacity="0.90"/>
    <rect x="118" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="141" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="164" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="190" y="0" width="20" height="14" rx="2" fill="#e05530" opacity="0.90"/>
    <rect x="213" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="236" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="259" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="285" y="0" width="20" height="14" rx="2" fill="#e05530" opacity="0.90"/>
    <rect x="308" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="331" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="354" y="0" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <!-- snare pattern: 5,13 -->
    <rect x="0"   y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="23"  y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="46"  y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="69"  y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="95"  y="20" width="20" height="14" rx="2" fill="#d4a020" opacity="0.90"/>
    <rect x="118" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="141" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="164" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="190" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="213" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="236" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="259" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="285" y="20" width="20" height="14" rx="2" fill="#d4a020" opacity="0.90"/>
    <rect x="308" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="331" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="354" y="20" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <!-- hihat pattern: every 2 steps -->
    <rect x="0"   y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="23"  y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="46"  y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="69"  y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="95"  y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="118" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="141" y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="164" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="190" y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="213" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="236" y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="259" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="285" y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="308" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <rect x="331" y="40" width="20" height="14" rx="2" fill="#30c8a0" opacity="0.85"/>
    <rect x="354" y="40" width="20" height="14" rx="2" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  </g>

  <!-- "BEAT MODE" label -->
  <text x="635" y="575" font-family="ui-monospace,'SF Mono','Fira Code',monospace"
        font-size="11" letter-spacing="4" fill="rgba(255,255,255,0.22)" font-weight="400">BEAT MODE</text>

  <!-- ── Wordmark & version ──────────────────────────────────── -->
  <text x="600" y="72" font-family="ui-monospace,'SF Mono','Fira Code',monospace"
        font-size="36" letter-spacing="14" fill="rgba(255,255,255,0.88)"
        text-anchor="middle" font-weight="700">NOISEN</text>
  <text x="600" y="96" font-family="ui-monospace,'SF Mono','Fira Code',monospace"
        font-size="12" letter-spacing="4" fill="rgba(255,255,255,0.28)"
        text-anchor="middle">quiet your mind with noise · v3.0</text>

  <!-- version badge -->
  <rect x="552" y="104" width="96" height="20" rx="4" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <text x="600" y="118" font-family="ui-monospace,'SF Mono','Fira Code',monospace"
        font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.40)"
        text-anchor="middle">ambient + beat</text>
</svg>
